{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student AI Chatbot</title>

<link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">StudentAI</div>

    <div class="user">
        <img src="{% static 'user.png' %}" alt="User">
    </div>
</nav>


<div class="container">
    <div class="history">
        <h3>Chat History</h3>
        <p class="empty">No Conversation History</p>
    </div>

    
    <div class="chat-section">

        <div class="chat-box" id="chat-box">
            {% for msg in messages %}
            <div class="message {% if msg.type == 'user' %}user-message{% else %}bot-message{% endif %}">
                <p>
                    <b>{% if msg.type == 'user' %}You{% else %}Bot{% endif %}:</b>
                    {{ msg.text }}
                </p>
            </div>
            {% empty %}
            <p>No messages yet</p>
            {% endfor %}
        </div>

    
        <form class="chat-form" id="chat-form">
            {% csrf_token %}

            <input 
                type="text" 
                id="prompt-input"
                name="prompt" 
                placeholder="Ask anything about coding or studies..." 
                required
            >

            <button type="submit">Send</button>
        </form>

    </div>

</div>


<script>
const form = document.getElementById("chat-form");
const input = document.getElementById("prompt-input");
const chatBox = document.getElementById("chat-box");

window.onload = function () {
    chatBox.scrollTop = chatBox.scrollHeight;
};

form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const prompt = input.value.trim();
    if (!prompt) return;

    const userDiv = document.createElement("div");
    userDiv.className = "message user-message";
    userDiv.innerHTML = `<p><b>You:</b> ${prompt}</p>`;
    chatBox.appendChild(userDiv);

    input.value = "";

    const botDiv = document.createElement("div");
    botDiv.className = "message bot-message";
    botDiv.innerHTML = `<p><b>Bot:</b> <span class="bot-text"></span></p>`;
    chatBox.appendChild(botDiv);

    const botText = botDiv.querySelector(".bot-text");

    const response = await fetch(`/stream/?prompt=${encodeURIComponent(prompt)}`);
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let result = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        result += chunk;

        botText.innerText = result;

        chatBox.scrollTop = chatBox.scrollHeight;
    }
});
</script>

</body>
</html>
